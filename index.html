<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allu Creative Lab | Design Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <!-- Carousel Manager (Vertical Strip on Right) -->
    <div id="carousel-manager" style="display: none; position: fixed; right: 24px; top: 50%; transform: translateY(-50%); background: #161617; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 20px; z-index: 9999; box-shadow: 0 10px 40px rgba(0,0,0,0.8); flex-direction: column; align-items: center; gap: 12px; width: 85px;">
        <div style="padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; width: 100%;">
            <span style="font-size: 10px; font-weight: 800; color: #27AE60; letter-spacing: 1px; margin-bottom: 2px;">PÁGINAS</span>
            <span id="carousel-count" style="font-size: 12px; font-weight: 700; color: white;">1 / 1</span>
        </div>
        <div id="carousel-pages" style="display: flex; flex-direction: column; gap: 10px; align-items: center; max-height: 50vh; overflow-y: auto; padding: 2px; scrollbar-width: none; width: 100%;">
            <!-- Thumbnails JS -->
        </div>
        <button id="btn-add-page" style="width: 50px; height: 50px; border-radius: 15px; background: #27AE60; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4); margin-top: 5px;" title="Nova Página">
            <i class="fa-solid fa-plus" style="font-size: 1.4rem;"></i>
        </button>
    </div>

    <!-- Barra de Ferramentas Vertical -->
    <aside class="toolbar">
        <div class="logo">
            <img src="assets/logos/Primario.svg" alt="Allu">
        </div>
        <button class="btn-tool" title="Produtos" data-tab="products">
            <i class="fa-solid fa-cart-shopping"></i>
            <span>Produtos</span>
        </button>
        <button class="btn-tool" title="Formas" data-tab="shapes">
            <i class="fa-solid fa-shapes"></i>
            <span>Formas</span>
        </button>
        <button class="btn-tool" title="Logos" data-tab="logos">
            <i class="fa-solid fa-certificate"></i>
            <span>Logos</span>
        </button>
        <button class="btn-tool" title="Texto" data-tab="text">
            <i class="fa-solid fa-font"></i>
            <span>Texto</span>
        </button>
        <button class="btn-tool" title="Imagens" data-tab="images">
            <i class="fa-solid fa-image"></i>
            <span>Imagens</span>
        </button>
        <button class="btn-tool" title="Fundo" data-tab="brand">
            <i class="fa-solid fa-fill-drip"></i>
            <span>Fundo</span>
        </button>
        <button class="btn-tool" title="Camadas" data-tab="layers">
            <i class="fa-solid fa-layer-group"></i>
            <span>Camadas</span>
        </button>
        <button class="btn-tool" title="Propriedades" data-tab="properties">
            <i class="fa-solid fa-sliders"></i>
            <span>Propriedades</span>
        </button>
        <div style="margin-top: auto;">
        </div>
    </aside>

    <!-- Sidebar de Opções -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2 id="sidebar-title">Modelos</h2>
            <p class="subtitle">Escolha o formato ideal</p>
        </div>
        
        <div class="sidebar-content" id="sidebar-content">
            <!-- Conteúdo dinâmico via JS (Produtos, Texto, etc) -->
        </div>
    </aside>

    <!-- Área Principal do Editor -->
    <main class="main-content">
        <header style="height: 60px; background: var(--bg-main); border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; padding: 0 24px; justify-content: space-between;">
            <div id="format-display-container" style="display:flex; align-items:center; gap:8px;">
                <div id="format-display" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.borderColor='var(--accent)';" onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.borderColor='var(--glass-border)';" onclick="document.getElementById('onboarding-modal').style.display='flex'; document.getElementById('onboarding-step-1').style.display='block'; document.getElementById('onboarding-step-2').style.display='none'; document.getElementById('step-2-dot').classList.remove('active'); document.getElementById('step-1-dot').classList.add('active');">
                    Instagram Feed (1080x1080) <i class="fa-solid fa-chevron-down" style="font-size: 0.7em; margin-left: 4px; color: var(--accent);"></i>
                </div>
            </div>
            <div style="display: flex; gap: 20px; align-items: center;">
                <div class="align-controls" style="display: flex; gap: 4px; align-items: center; border-right: 1px solid var(--glass-border); padding-right: 20px;">
                    <button class="btn-primary" id="align-left" title="Alinhar à Esquerda" style="padding:8px 10px; border-radius:6px; background:transparent; color:var(--text-secondary); border:1px solid transparent; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.color='white'; this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background='transparent'">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="2" height="12"></rect><rect x="6" y="5" width="8" height="6"></rect></svg>
                    </button>
                    <button class="btn-primary" id="align-center-h" title="Centralizar Horizontalmente" style="padding:8px 10px; border-radius:6px; background:transparent; color:var(--text-secondary); border:1px solid transparent; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.color='white'; this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background='transparent'">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="7" y="2" width="2" height="12"></rect><rect x="4" y="5" width="8" height="6"></rect></svg>
                    </button>
                    <button class="btn-primary" id="align-right" title="Alinhar à Direita" style="padding:8px 10px; border-radius:6px; background:transparent; color:var(--text-secondary); border:1px solid transparent; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.color='white'; this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background='transparent'">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="12" y="2" width="2" height="12"></rect><rect x="2" y="5" width="8" height="6"></rect></svg>
                    </button>
                    <div style="width:1px; height:16px; background:var(--glass-border); margin:0 4px;"></div>
                    <button class="btn-primary" id="align-top" title="Alinhar ao Topo" style="padding:8px 10px; border-radius:6px; background:transparent; color:var(--text-secondary); border:1px solid transparent; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.color='white'; this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background='transparent'">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="2"></rect><rect x="5" y="6" width="6" height="8"></rect></svg>
                    </button>
                    <button class="btn-primary" id="align-center-v" title="Centralizar Verticalmente" style="padding:8px 10px; border-radius:6px; background:transparent; color:var(--text-secondary); border:1px solid transparent; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.color='white'; this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background='transparent'">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="7" width="12" height="2"></rect><rect x="5" y="4" width="6" height="8"></rect></svg>
                    </button>
                    <button class="btn-primary" id="align-bottom" title="Alinhar à Base" style="padding:8px 10px; border-radius:6px; background:transparent; color:var(--text-secondary); border:1px solid transparent; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.color='white'; this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background='transparent'">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="12" width="12" height="2"></rect><rect x="5" y="2" width="6" height="8"></rect></svg>
                    </button>
                </div>
                <div class="history-controls" style="display: flex; gap: 8px; align-items: center; border-right: 1px solid var(--glass-border); padding-right: 20px;">
                    <button class="btn-primary" id="btn-undo" title="Desfazer (Cmd+Z)" style="padding:8px 10px; border-radius:6px; background:transparent; color:var(--text-secondary); border:1px solid transparent; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.color='white'; this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background='transparent'">
                        <i class="fa-solid fa-rotate-left"></i>
                    </button>
                    <button class="btn-primary" id="btn-redo" title="Refazer (Cmd+Shift+Z)" style="padding:8px 10px; border-radius:6px; background:transparent; color:var(--text-secondary); border:1px solid transparent; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.color='white'; this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background='transparent'">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>
                <div class="zoom-controls" style="display: flex; gap: 4px; align-items: center; border-right: 1px solid var(--glass-border); padding-right: 20px;">
                    <button id="btn-zoom-out" title="Diminuir zoom (⌘ -)" style="width:28px; height:28px; border-radius:6px; background:transparent; border:none; color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; font-size:0.85rem;" onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='white';" onmouseout="this.style.background='transparent'; this.style.color='var(--text-secondary)';"><i class="fa-solid fa-minus"></i></button>
                    <span id="zoom-display" title="Clique: 100% · Duplo clique: Ajustar à tela (⌘ 0)" style="font-size: 0.78rem; font-weight:700; color:white; min-width:42px; text-align:center; padding:4px 8px; border-radius:6px; cursor:pointer; transition:background 0.15s; user-select:none;" onmouseover="this.style.background='rgba(255,255,255,0.08)';" onmouseout="this.style.background='transparent';">100%</span>
                    <button id="btn-zoom-in" title="Aumentar zoom (⌘ +)" style="width:28px; height:28px; border-radius:6px; background:transparent; border:none; color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; font-size:0.85rem;" onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='white';" onmouseout="this.style.background='transparent'; this.style.color='var(--text-secondary)';"><i class="fa-solid fa-plus"></i></button>
                    <button id="btn-zoom-fit" title="Ajustar à tela (⌘ 0)" style="width:28px; height:28px; border-radius:6px; background:transparent; border:none; color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; font-size:0.85rem;" onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='white';" onmouseout="this.style.background='transparent'; this.style.color='var(--text-secondary)';"><i class="fa-solid fa-expand"></i></button>
                </div>

                <button class="btn-primary" id="btn-sync" style="padding:8px 16px; border-radius:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--glass-border); cursor:pointer; display:flex; align-items:center; gap:8px;">
                    <i class="fa-solid fa-arrows-rotate" style="color:var(--accent);"></i> Atualizar Catálogo
                </button>
                <div style="position: relative;" id="export-dropdown-container">
                    <button class="btn-primary" id="btn-download" style="padding:8px 16px; border-radius:8px; background:var(--accent); color:white; border:none; cursor:pointer; display:flex; align-items:center; gap:8px;">
                        <i class="fa-solid fa-download"></i> Exportar <i class="fa-solid fa-chevron-down" style="font-size: 0.7em;"></i>
                    </button>
                    <div id="export-menu" style="display:none; position:absolute; top:100%; right:0; margin-top:8px; background:var(--bg-main); border:1px solid var(--glass-border); border-radius:8px; padding:8px; width:150px; z-index:1000; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
                        <button class="export-option" data-format="png" style="width:100%; text-align:left; padding:10px; background:transparent; border:none; color:white; cursor:pointer; border-radius:6px; transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">Exportar PNG</button>
                        <button class="export-option" data-format="jpg" style="width:100%; text-align:left; padding:10px; background:transparent; border:none; color:white; cursor:pointer; border-radius:6px; transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">Exportar JPG</button>
                        <button class="export-option" data-format="pdf" style="width:100%; text-align:left; padding:10px; background:transparent; border:none; color:white; cursor:pointer; border-radius:6px; transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">Exportar PDF</button>
                    </div>
                </div>
            </div>
        </header>

        <div id="canvas-wrapper">
            <canvas id="main-canvas"></canvas>
        </div>
    </main>

    <!-- Modal de Onboarding -->

    <div id="onboarding-modal" class="modal-overlay">
        <div class="modal-card animate-fade">
            <button onclick="document.getElementById('onboarding-modal').style.display='none'" style="position: absolute; top: 20px; right: 24px; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.2rem; transition: all 0.2s; z-index: 10;" onmouseover="this.style.color='white'" onmouseout="this.style.color='var(--text-secondary)'"><i class="fa-solid fa-xmark"></i></button>
            <div class="onboarding-steps">
                <div class="step-dot active" id="step-1-dot"></div>
                <div class="step-dot" id="step-2-dot"></div>
            </div>
            
            <div id="onboarding-step-1">
                <h2>Bem-vindo ao Allu Creative Lab</h2>
                <p class="subtitle">Para começar, selecione em qual rede social você quer publicar:</p>
                <div class="network-selector">
                    <button class="network-btn" data-network="instagram">
                        <i class="fa-brands fa-instagram"></i>
                        <span>Instagram</span>
                    </button>
                    <button class="network-btn" data-network="facebook">
                        <i class="fa-brands fa-facebook"></i>
                        <span>Facebook</span>
                    </button>
                    <button class="network-btn" data-network="whatsapp">
                        <i class="fa-brands fa-whatsapp"></i>
                        <span>WhatsApp</span>
                    </button>
                    <button class="network-btn" data-network="linkedin">
                        <i class="fa-brands fa-linkedin"></i>
                        <span>LinkedIn</span>
                    </button>
                    <button class="network-btn" data-network="twitter">
                        <i class="fa-brands fa-x-twitter"></i>
                        <span>X (Twitter)</span>
                    </button>
                    <button class="network-btn" data-network="email">
                        <i class="fa-solid fa-envelope"></i>
                        <span>Email</span>
                    </button>
                </div>
            </div>

            <div id="onboarding-step-2" style="display: none;">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <button id="btn-onboarding-back" style="background: transparent; border: 1px solid var(--glass-border); color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
                        <i class="fa-solid fa-chevron-left" style="font-size: 0.8rem;"></i>
                    </button>
                    <h2 style="margin: 0;">Escolha o Formato ou Modelo</h2>
                </div>
                <p class="subtitle">Selecione o layout ideal ou comece com um modelo pronto:</p>
                <div class="preset-grid" id="onboarding-presets">
                    <!-- Gerado via JS baseado na rede social -->
                </div>
            </div>

        </div>
    </div>


    <script src="assets/products.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
