name: Sincronizar Produtos Allu

on:
  schedule:
    - cron: '0 * * * *' # Roda a cada 1 hora
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repositório
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m playwright install chromium

    - name: Executar script de sincronização
      run: python sync_products.py

    - name: Commitar e Push das mudanças
      run: |
        git config --global user.name 'Allu Bot'
        git config --global user.email 'bot@allugator.com'
        git add assets/products.json assets/products.js assets/products/
        git diff --quiet && git diff --staged --quiet || (git commit -m "data: sync products automation" && git push)
